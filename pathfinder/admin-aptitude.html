<!DOCTYPE html>
<html>
<head>
<title>Manage Aptitude Questions</title>

<style>

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:10px;
}

button{
margin:5px;
}

</style>

</head>

<body>

<h2>Manage Aptitude Questions</h2>

<button onclick="addQuestion()">Add Question</button>

<table id="questionTable">

<tr>
<th>Question</th>
<th>Skill Domain</th>
<th>Actions</th>
</tr>

</table>

<h2>User Aptitude Results</h2>

<table id="resultsTable">

<tr>
<th>User</th>
<th>Top Domain</th>
<th>Second Domain</th>
</tr>

</table>

<script>


async function loadQuestions(){

const res = await fetch("http://localhost:5000/api/admin/questions")
const questions = await res.json()

const table = document.getElementById("questionTable")

questions.forEach(q=>{

const row=document.createElement("tr")

row.innerHTML = `
<td>${q.text}</td>
<td>${q.category}</td>

<td>
<button onclick="editQuestion('${q._id}')">Edit</button>
<button onclick="deleteQuestion('${q._id}')">Delete</button>
</td>
`


table.appendChild(row)

})

}


function addQuestion(){

const question = prompt("Enter question")
const domain = prompt("Skill profile / domain")

fetch("http://localhost:5000/api/admin/addQuestion",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({question,domain})

}).then(()=>location.reload())

}


function editQuestion(id){

const question = prompt("New question")

fetch("http://localhost:5000/api/admin/editQuestion/"+id,{

method:"PUT",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({question})

}).then(()=>location.reload())

}


function deleteQuestion(id){

fetch("http://localhost:5000/api/admin/deleteQuestion/"+id,{
method:"DELETE"
}).then(()=>location.reload())

}



async function loadResults(){

const res = await fetch("http://localhost:5000/api/admin/aptitudeResults")
const data = await res.json()

const table = document.getElementById("resultsTable")

data.forEach(r=>{

const row=document.createElement("tr")

row.innerHTML=`

<td>${r.user?.name}</td>
<td>${r.topAptitudeDomain}</td>
<td>${r.secondAptitudeDomain}</td>

`

table.appendChild(row)

})

}


loadQuestions()
loadResults()

</script>

</body>
</html>
