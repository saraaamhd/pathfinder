<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Career Domains | Pathfinder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="career-domains.css" />
   <link rel="stylesheet" href="components/navbar.css"
</head>
<body>
  <div class="navbar-wrapper"
<div id="navbar-container"></div>
</div>
  <!-- ===== ZONE 1 : TOP (WHITE) ===== -->
  <section class="zone-top">
    <h1>Career Domains</h1>
    <p>Select a domain to explore detailed career paths</p>
  </section>

  <!-- ===== ZONE 2 : BOTTOM (BLUE) ===== -->
  <section class="zone-bottom">

    <div class="carousel">

      <!-- CARD 0 -->
      <div class="card" data-link="software-development.html">
        <div class="icon">💻</div>
        <div class="label">Software Development</div>
      </div>

      <!-- CARD 1 -->
      <div class="card" data-link="cybersecurity.html">
        <div class="icon">🛡️</div>
        <div class="label">Cybersecurity</div>
      </div>

      <!-- CARD 2 -->
      <div class="card" data-link="data-analytics.html">
        <div class="icon">📊</div>
        <div class="label">Data & Analytics</div>
      </div>

      <!-- CARD 3 -->
      <div class="card" data-link="ai.html">
        <div class="icon">🤖</div>
        <div class="label">Artificial Intelligence</div>
      </div>

      <!-- CARD 4 -->
      <div class="card" data-link="cloud.html">
        <div class="icon">☁️</div>
        <div class="label">Cloud Computing</div>
      </div>

      <!-- CARD 5 -->
      <div class="card" data-link="iot.html">
        <div class="icon">📡</div>
        <div class="label">Internet of Things</div>
      </div>

    </div>

    <!-- Navigation arrows (logic later) -->
    <div class="carousel-controls">
      <button id="prevBtn">←</button>
      <button id="nextBtn">→</button>
    </div>
<div class="carousel-dots">
  <!-- dots will be generated by JS -->
</div>

  </section>

  <script src="career-domains.js"></script>
  <script>
async function loadNavbar() {
  const response = await fetch("components/navbar.html");
  const html = await response.text();
  document.getElementById("navbar-container").innerHTML = html;
}

loadNavbar();
</script>
</body>
</html>
