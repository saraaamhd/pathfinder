<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password | Pathfinder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="login-page">

    <div class="login-card">
      <h2>Reset Password</h2>

      <form>
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your registered email" />

        <label>Security Question</label>
        <input type="text" id="securityAnswer" placeholder="What was your first school?" />

        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password" />

        <button type="button" class="login-btn" id="resetBtn">Reset Password</button>
      </form>

      <p class="signup-text">
        Remembered your password?
        <a href="login.html">Login</a>
      </p>
    </div>

  </div>

<script>
document.getElementById("resetBtn").addEventListener("click", async function () {

  const email = document.getElementById("email").value.trim();
  const securityAnswer = document.getElementById("securityAnswer").value.trim();
  const newPassword = document.getElementById("newPassword").value.trim();

  if (!email || !securityAnswer || !newPassword) {
    alert("Please fill all fields");
    return;
  }

  try {
    const response = await fetch("http://localhost:5000/api/auth/forgot-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        securityAnswer,
        newPassword
      })
    });

    const data = await response.json();

    if (response.ok) {
      alert("Password reset successful. Please login.");
      window.location.href = "login.html";
    } else {
      alert(data.message);
    }

  } catch (error) {
    alert("Server error");
  }

});
</script>

</body>
</html>
