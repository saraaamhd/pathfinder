<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Skill Profile | Pathfinder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="skill-profile.css" />
</head>
<body>

  <div class="profile-bg">

    <div class="profile-card">

      <h2>Technical Skill Profile</h2>
      <p class="subtitle">
        Select your current level in each area
      </p>

      <form id="skillForm">

        <!-- Programming -->
        <h3>Programming</h3>

        <div class="field">
          <label>Python</label>
          <select name="python">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <div class="field">
          <label>Java</label>
          <select name="java">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <div class="field">
          <label>JavaScript</label>
          <select name="javascript">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <div class="field">
          <label>C / C++</label>
          <select name="cpp">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <!-- Development -->
        <h3>Development</h3>

        <div class="field">
          <label>Web Development</label>
          <select name="webdev">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <div class="field">
          <label>Backend Development</label>
          <select name="backend">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <div class="field">
          <label>Data Structures & Algorithms</label>
          <select name="dsa">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <!-- Data & Intelligence -->
        <h3>Data & Intelligence</h3>

        <div class="field">
          <label>Statistics / Probability</label>
          <select name="statistics">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <div class="field">
          <label>Data Analysis</label>
          <select name="dataanalysis">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <!-- Systems -->
        <h3>Systems & Infrastructure</h3>

        <div class="field">
          <label>Linux / Command Line</label>
          <select name="linux">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <div class="field">
          <label>Networking Basics</label>
          <select name="networking">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <!-- Cloud & Hardware -->
        <h3>Platforms & Hardware</h3>

        <div class="field">
          <label>Cloud Platforms</label>
          <select name="cloud">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <div class="field">
          <label>Docker / Virtualization</label>
          <select name="docker">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <div class="field">
          <label>Electronics Basics</label>
          <select name="electronics">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <div class="field">
          <label>Microcontrollers</label>
          <select name="microcontrollers">
            <option value="0">Not Known</option>
            <option value="1">Beginner</option>
            <option value="2">Intermediate</option>
            <option value="3">Advanced</option>
          </select>
        </div>

        <button type="submit" class="save-btn">
          Save & Continue
        </button>

      </form>

    </div>

  </div>

<script src="skill-profile.js"></script>
</body>
</html>
