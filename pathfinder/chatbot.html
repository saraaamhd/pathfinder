<div class="chat-wrapper">

<h2>Pathfinder AI Career Coach</h2>

<div id="chatBox" class="chat-box">
<div class="bot-msg">Hello! I'm your AI Career Coach. Ask me anything about careers or technology.</div>
</div>

<div class="input-area">
<input id="userInput" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<style>

.chat-wrapper{
max-width:700px;
margin:auto;
display:flex;
flex-direction:column;
height:70vh;
font-family:Arial;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:20px;
background:#f8fafc;
border-radius:15px;
margin-bottom:10px;
display:flex;
flex-direction:column;
gap:12px;
}

.user-msg{
align-self:flex-end;
background:#6366f1;
color:white;
padding:10px 15px;
border-radius:15px;
max-width:70%;
}

.bot-msg{
align-self:flex-start;
background:#e2e8f0;
padding:10px 15px;
border-radius:15px;
max-width:70%;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
background:#0f172a;
color:white;
border-radius:10px;
cursor:pointer;
}

</style>

<script>

async function sendMessage(){

const input=document.getElementById("userInput");
const chat=document.getElementById("chatBox");

if(!input.value.trim()) return;

const userDiv=document.createElement("div");
userDiv.className="user-msg";
userDiv.innerText=input.value;

chat.appendChild(userDiv);

const message=input.value;
input.value="";

chat.scrollTop=chat.scrollHeight;

const response=await 
fetch("http://localhost:5000/api/chatbot/chat", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message})
});

const data=await response.json();

const botDiv=document.createElement("div");
botDiv.className="bot-msg";
botDiv.innerText=data.reply;

chat.appendChild(botDiv);

chat.scrollTop=chat.scrollHeight;

}

</script>
